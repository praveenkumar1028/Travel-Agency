<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Book a Trip – Wanderlust</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
  {% include 'navbar.html' %}
  <div class="page-hero">
    <div class="section-label">Book Your Adventure</div>
    <h1 class="section-title">Reserve Your Trip</h1>
    <p style="color:var(--text-muted);">Select a package and pick your travel date to secure your spot.</p>
  </div>
  <div class="booking-layout">
    <div class="booking-form-card fade-in">
      <h2><i class="fas fa-suitcase-rolling" style="color:var(--accent);margin-right:0.5rem;"></i>Trip Details</h2>
      <form method="POST" action="{{ url_for('book') }}">
        <div class="form-group">
          <label>Select Destination</label>
          <select name="package_id" id="package_id" required>
            <option value="" disabled selected>Choose a package…</option>
            {% for pkg in packages %}
            <option value="{{ pkg.id }}" data-price="{{ pkg.price }}" data-title="{{ pkg.title }}" {% if request.args.get('pkg')|string == pkg.id|string %}selected{% endif %}>{{ pkg.title }} — ${{ "%.2f"|format(pkg.price) }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Travel Date</label>
          <input type="date" name="travel_date" id="travel_date" required min="{{ now_date }}"/>
        </div>
        <div class="form-group">
          <label>Number of Travellers</label>
          <select name="travellers">
            <option value="1">1 Person</option>
            <option value="2">2 People</option>
            <option value="3">3 People</option>
            <option value="4">4 People</option>
            <option value="5+">5+ People</option>
          </select>
        </div>
        <button class="btn-full" type="submit"><i class="fas fa-check-circle"></i> Confirm Booking</button>
      </form>
    </div>
    <div class="booking-summary fade-in">
      <h3><i class="fas fa-receipt" style="color:var(--accent);margin-right:0.5rem;"></i>Booking Summary</h3>
      <div class="summary-row"><span class="label">Package</span><span id="sum-pkg" style="color:var(--text);font-weight:600;">—</span></div>
      <div class="summary-row"><span class="label">Travel Date</span><span id="sum-date" style="color:var(--text);">—</span></div>
      <div class="summary-total"><span class="label">Total Price</span><span class="value" id="sum-price">—</span></div>
      <div style="margin-top:1.5rem;padding:1rem;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:12px;font-size:0.82rem;color:#10b981;">
        <i class="fas fa-shield-alt"></i> Secure booking · Free cancellation within 24h
      </div>
    </div>
  </div>
  <script>
    const sel = document.getElementById('package_id');
    const preselect = '{{ request.args.get("pkg","") }}';
    if(preselect && sel) {
      for(let o of sel.options) if(o.value===preselect) { o.selected=true; break; }
    }
  </script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
