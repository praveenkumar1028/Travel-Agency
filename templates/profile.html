<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Profile – Wanderlust</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
  {% include 'navbar.html' %}
  <div style="padding-top:5rem;"></div>
  <div style="max-width:700px;margin:0 auto;padding:3rem 5%;">
    <div style="text-align:center;margin-bottom:2.5rem;">
      <div style="width:80px;height:80px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;margin:0 auto 1rem;">{{ user.name[0].upper() }}</div>
      <h2 style="font-size:1.5rem;font-weight:700;">{{ user.name }}</h2>
      <p style="color:var(--text-muted);font-size:.88rem;">{{ user.email }}</p>
    </div>
    <div class="section-card fade-in">
      <h3 style="margin-bottom:1.5rem;"><i class="fas fa-user-edit" style="color:var(--accent);margin-right:.5rem;"></i>Edit Profile</h3>
      <form method="POST" action="{{ url_for('profile') }}">
        <div class="form-group"><label>Full Name</label><input type="text" name="name" value="{{ user.name }}" required/></div>
        <div class="form-group"><label>Email (cannot change)</label><input type="email" value="{{ user.email }}" disabled style="opacity:.5;"/></div>
        <div class="form-group"><label>Phone</label><input type="text" name="phone" value="{{ user.phone or '' }}" placeholder="+91 98765 43210"/></div>
        <div class="form-group"><label>Country</label><input type="text" name="country" value="{{ user.country or '' }}" placeholder="India"/></div>
        <button class="btn-full" type="submit"><i class="fas fa-save"></i> Save Changes</button>
      </form>
    </div>
    <div style="text-align:center;margin-top:1.5rem;">
      <a href="{{ url_for('dashboard') }}" class="btn-outline" style="padding:.7rem 1.5rem;display:inline-flex;align-items:center;gap:.5rem;"><i class="fas fa-tachometer-alt"></i> Back to Dashboard</a>
    </div>
  </div>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
