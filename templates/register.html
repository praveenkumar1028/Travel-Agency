<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Register – Wanderlust</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
  <div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}
    {% endwith %}
  </div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon"><i class="fas fa-globe-americas"></i></div>
        <h2>Create Account</h2>
        <p class="subtitle">Join thousands of happy travellers</p>
      </div>
      <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Full Name</label>
          <input type="text" name="name" placeholder="John Doe" required autocomplete="name"/>
        </div>
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <input type="password" name="password" placeholder="Min. 6 characters" required minlength="6"/>
        </div>
        <button class="btn-full" type="submit"><i class="fas fa-user-plus"></i> Create Account</button>
      </form>
      <div class="divider">or</div>
      <div class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></div>
      <div style="text-align:center;margin-top:1rem;"><a href="{{ url_for('index') }}" style="color:var(--text-muted);font-size:0.82rem;text-decoration:none;"><i class="fas fa-arrow-left"></i> Back to home</a></div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
