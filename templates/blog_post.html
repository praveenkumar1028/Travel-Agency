<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{{ post.title }} – Wanderlust Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <style>
    .post-hero{position:relative;height:60vh;background:center/cover no-repeat;display:flex;align-items:flex-end;}
    .post-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(10,15,30,.95),rgba(10,15,30,.2));}
    .post-hero-content{position:relative;z-index:2;padding:3rem 5%;width:100%;max-width:900px;}
    .post-body{max-width:780px;margin:0 auto;padding:3rem 5%;}
    .post-content{color:var(--text-muted);line-height:2;font-size:1.05rem;}
    .related-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;margin-top:2rem;}
  </style>
</head>
<body>
  {% include 'navbar.html' %}
  <div class="post-hero" style="background-image:url('{{ url_for('static', filename='images/' + post.image_url) }}')">
    <div class="post-hero-content">
      <div class="hero-badge"><i class="fas fa-newspaper"></i> Blog</div>
      <h1 style="font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,3rem);margin-top:.8rem;line-height:1.2;">{{ post.title }}</h1>
      <p style="color:var(--text-muted);margin-top:.8rem;font-size:.9rem;"><i class="fas fa-user"></i> {{ post.author }} &nbsp;&bull;&nbsp; <i class="fas fa-calendar"></i> {{ post.created_at[:10] }}</p>
    </div>
  </div>
  <div class="post-body">
    <div class="post-content">{{ post.content }}</div>
    <div style="margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);">
      <a href="{{ url_for('blog') }}" class="btn-outline" style="padding:.7rem 1.5rem;display:inline-flex;align-items:center;gap:.5rem;"><i class="fas fa-arrow-left"></i> Back to Blog</a>
    </div>
    {% if others %}
    <div style="margin-top:3rem;">
      <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:1.5rem;">More Stories</h3>
      <div class="related-grid">
        {% for o in others %}
        <a href="{{ url_for('blog_post', slug=o.slug) }}" style="background:var(--secondary);border:1px solid var(--border);border-radius:14px;overflow:hidden;text-decoration:none;display:block;transition:all .3s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
          <img src="{{ url_for('static', filename='images/' + o.image_url) }}" style="width:100%;height:140px;object-fit:cover;"/>
          <div style="padding:1rem;"><div style="font-weight:600;color:var(--text);font-size:.9rem;line-height:1.4;">{{ o.title }}</div><div style="font-size:.78rem;color:var(--text-muted);margin-top:.4rem;">{{ o.author }}</div></div>
        </a>
        {% endfor %}
      </div>
    </div>
    {% endif %}
  </div>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
